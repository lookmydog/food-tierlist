<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --text: #1a1a1a;
    --text-muted: #888;
    --accent: #ff6b35;
    --accent2: #ffd166;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    
    --sss: #ff4757;
    --ss: #ff7f50;
    --s:  #ffa502;
    --a:  #2ed573;
    --b:  #1e90ff;
    --c:  #a29bfe;
    --d:  #b2bec3;
    --pun: #6d4c41;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-logo {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }

  /* ── User Badge ── */
  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px 6px 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .user-badge:hover { background: var(--border); }
  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  /* ── Online Users ── */
  .online-users {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .online-dot {
    width: 7px; height: 7px;
    background: #2ed573;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .avatar-stack {
    display: flex;
    margin-left: 4px;
  }
  .avatar-stack .avatar {
    width: 24px; height: 24px;
    border: 2px solid var(--surface);
    margin-left: -6px;
    font-size: 0.65rem;
  }
  .avatar-stack .avatar:first-child { margin-left: 0; }

  /* ── Main Layout ── */
  .main {
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Input Area ── */
  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .add-card-title {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  .url-input {
    flex: 1;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--accent); background: white; }
  .url-input::placeholder { color: var(--text-muted); }
  .add-btn {
    padding: 11px 22px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-btn:hover { background: #e55a24; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,107,53,0.35); }
  .add-btn:active { transform: translateY(0); }
  .add-btn:disabled { cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  /* ── Inline name row ── */
  .name-input-row {
    margin-top: 10px;
    animation: slideDown 0.22s cubic-bezier(0.34, 1.3, 0.64, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .name-row-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text-muted);
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
  }
  .name-row-icon { font-size: 0.9rem; }
  .name-row-url {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: monospace;
    font-size: 0.75rem;
    color: #999;
  }
  .name-row-clear {
    background: none; border: none;
    color: #bbb; cursor: pointer;
    font-size: 0.85rem; padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .name-row-clear:hover { color: #e74c3c; }

  /* ── Tier List ── */
  .tier-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .tier-row {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 80px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .tier-row.drag-over {
    box-shadow: 0 0 0 2px var(--accent), var(--shadow-lg);
  }

  .tier-label {
    width: 80px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -1px;
    color: rgba(0,0,0,0.18);
    position: relative;
  }
  .tier-label::after {
    content: '';
    position: absolute;
    right: 0;
    top: 12px; bottom: 12px;
    width: 1px;
    background: rgba(0,0,0,0.08);
  }

  .tier-sss { background: var(--sss); }
  .tier-ss  { background: var(--ss);  }
  .tier-s   { background: var(--s);   }
  .tier-a   { background: var(--a);   }
  .tier-b   { background: var(--b);   }
  .tier-c   { background: var(--c);   }
  .tier-d   { background: var(--d);   }
  .tier-pun { background: var(--pun); color: rgba(255,255,255,0.5); }
  .tier-unranked { background: #dfe6e9; }

  .tier-items {
    flex: 1;
    padding: 10px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-content: flex-start;
    min-height: 90px;
  }

  /* ── Food Item (卡片) ── */
  .food-item {
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    cursor: grab;
    transition: all 0.15s;
    user-select: none;
    width: 110px;
    overflow: hidden;
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    position: relative;
  }
  @media (max-width: 480px) {
    .food-item { width: calc(50% - 4px); }
    .tier-items { gap: 8px; }
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .food-item:hover {
    border-color: #ccc;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
  .food-item:active { cursor: grabbing; transform: scale(0.97); }
  .food-item.dragging { opacity: 0.4; }

  /* 卡片頂部色條 */
  .food-item-bar {
    height: 4px;
    width: 100%;
    flex-shrink: 0;
  }

  /* 卡片內容區 */
  .food-item-body {
    padding: 8px 10px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }

  .food-name {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-all;
  }
  .food-name:hover { color: var(--accent); }

  /* 卡片底部列：頭像 + 評論 + 刪除 */
  .food-item-footer {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px 8px;
  }

  .food-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }
  .food-added-by {
    font-size: 0.65rem;
    color: var(--text-muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .food-delete {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #ccc;
    font-size: 14px;
    line-height: 1;
    padding: 0;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .food-delete:hover { background: #fee; color: #e74c3c; }

  /* delete confirm state */
  .food-item.confirm-delete {
    border-color: #e74c3c;
    box-shadow: 0 0 0 2px rgba(231,76,60,0.15);
  }
  .food-delete.confirm {
    width: auto;
    border-radius: 6px;
    background: #e74c3c;
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 5px;
    white-space: nowrap;
    animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
  }
  .food-delete.confirm:hover { background: #c0392b; }

  /* ── Comment count badge on food item ── */
  .comment-badge {
    font-size: 0.6rem;
    font-weight: 700;
    background: var(--surface2);
    color: var(--text-muted);
    border-radius: 99px;
    padding: 3px 7px;
    border: 1px solid var(--border);
    white-space: nowrap;
    flex-shrink: 0;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .comment-badge:hover { background: var(--border); }
  .comment-badge.has-comments {
    background: var(--accent);
    color: white;
    border-color: transparent;
  }
  .comment-badge.has-comments:hover { background: #e55a24; }

  /* ── Comment Panel (slide-in from right) ── */
  .comment-panel-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 200;
    backdrop-filter: blur(2px);
    animation: fadeIn 0.2s;
  }
  .comment-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 380px;
    max-width: 100vw;
    background: var(--surface);
    box-shadow: -8px 0 40px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    z-index: 201;
    animation: slideInPanel 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  }
  @keyframes slideInPanel {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .panel-title-block { flex: 1; min-width: 0; }
  .panel-restaurant-name {
    font-size: 1rem;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .panel-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-tier-badge {
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 700;
    font-size: 0.7rem;
    color: rgba(0,0,0,0.5);
  }
  .panel-map-link {
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }
  .panel-map-link:hover { text-decoration: underline; }
  .panel-close {
    width: 32px; height: 32px;
    border: none; background: var(--surface2);
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .panel-close:hover { background: #fee; color: #e74c3c; }

  /* Comment list */
  .comment-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .comment-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.875rem;
    padding: 40px 0;
  }
  .comment-empty .empty-icon { font-size: 2rem; display: block; margin-bottom: 8px; }

  .comment-item {
    display: flex;
    gap: 10px;
    animation: popIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .comment-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .comment-body { flex: 1; min-width: 0; }
  .comment-meta {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 4px;
  }
  .comment-author {
    font-size: 0.8rem;
    font-weight: 700;
  }
  .comment-time {
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .comment-text {
    font-size: 0.875rem;
    line-height: 1.55;
    color: var(--text);
    background: var(--surface2);
    border-radius: 4px 12px 12px 12px;
    padding: 8px 12px;
    word-break: break-word;
  }
  .comment-delete-btn {
    background: none;
    border: none;
    color: #ddd;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0;
    margin-top: 4px;
    transition: color 0.15s;
  }
  .comment-delete-btn:hover { color: #e74c3c; }

  /* Comment input */
  .panel-input-area {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .comment-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .comment-textarea {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 0.875rem;
    font-family: inherit;
    background: var(--surface2);
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s, background 0.2s;
  }
  .comment-textarea:focus { border-color: var(--accent); background: white; }
  .comment-textarea::placeholder { color: var(--text-muted); }
  .comment-send-btn {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .comment-send-btn:hover { background: #e55a24; transform: scale(1.05); }
  .comment-send-btn:active { transform: scale(0.95); }
  .comment-send-btn svg { pointer-events: none; }

  /* ── Unranked Section ── */
  .unranked-section {
    margin-top: 20px;
  }
  .unranked-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .unranked-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .unranked-row {
    min-height: 90px;
  }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border-radius: 20px;
    padding: 32px;
    width: 360px;
    max-width: 90vw;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
  .modal p { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 20px; line-height: 1.5; }
  .modal input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn:hover { background: #e55a24; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a1a;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    z-index: 9999;
    animation: slideInRight 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideInRight {
    from { transform: translateX(60px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── Config Warning ── */
  .config-warning {
    background: #fff9e6;
    border: 1.5px solid #ffd166;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 0.875rem;
    line-height: 1.6;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .main { padding: 16px 12px 40px; }
    .tier-label { width: 52px; font-size: 1.2rem; }

</style>
</head>

<main class="main">

  </div>

  <!-- Add Card -->

  <div class="tier-container" id="tierContainer">

    </div>
    <div class="tier-row" data-tier="SS">

    </div>
    <div class="tier-row" data-tier="S">
      <div class="tier-label tier-s">S</div>

      <div class="tier-label tier-a">A</div>

      <div class="tier-items" id="unranked" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" style="min-height:90px;"></div>

</main>

<!-- ── Comment Panel ── -->
<div id="commentPanelBackdrop" class="comment-panel-backdrop" style="display:none" onclick="closeCommentPanel()"></div>
<div id="commentPanel" class="comment-panel" style="display:none">
  <div class="panel-header">
    <div class="panel-title-block">
      <div class="panel-restaurant-name" id="panelName">—</div>
      <div class="panel-meta">
        <span class="panel-tier-badge" id="panelTierBadge">—</span>

<!-- ── Name Modal ── -->
<div class="modal-backdrop" id="nameModal">
  <div class="modal">
    <h2>👋 你是哪位？</h2>
    <p>輸入你的暱稱，讓朋友知道是誰新增了餐廳、誰在線上！</p>
    <input type="text" id="nameInput" placeholder="輸入暱稱..." maxlength="12" onkeydown="if(event.key==='Enter')saveName()">
    <button class="modal-btn" onclick="saveName()">開始使用 🎉</button>
  </div>
</div>



<script>
// ════════════════════════════════
//  Color Palette for Avatars
// ════════════════════════════════
const COLORS = [
  '#ff6b35','#ff4757','#ffa502','#2ed573',
  '#1e90ff','#a29bfe','#fd79a8','#00b894',
  '#e17055','#6c5ce7','#00cec9','#fdcb6e'
];

function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return COLORS[Math.abs(hash) % COLORS.length];
}

function initials(name) {
  return name ? name.slice(0,2).toUpperCase() : '?';
}

// ════════════════════════════════
//  User Identity
// ════════════════════════════════
let currentUser = null;
let pendingUrl = null;

function loadUser() {
  const saved = localStorage.getItem('tierlist_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    applyUser();
    document.getElementById('nameModal').style.display = 'none';
  }
}

function applyUser() {
  document.getElementById('headerName').textContent = currentUser.name;
  const av = document.getElementById('headerAvatar');
  av.style.background = currentUser.color;
  av.textContent = initials(currentUser.name);
  updateOnlinePresence();
}

function saveName() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  currentUser = { name, color: stringToColor(name), id: Date.now().toString(36) };
  localStorage.setItem('tierlist_user', JSON.stringify(currentUser));
  document.getElementById('nameModal').style.display = 'none';
  applyUser();
  if (pendingUrl) { doAddRestaurant(pendingUrl); pendingUrl = null; }
}

function changeUser() {
  document.getElementById('nameInput').value = currentUser ? currentUser.name : '';
  document.getElementById('nameModal').style.display = 'flex';
  setTimeout(() => document.getElementById('nameInput').focus(), 100);
}

// ════════════════════════════════
//  Firebase helpers (called after ready)
// ════════════════════════════════
let db, dbRef, dbSet, dbPush, dbOnValue, dbRemove, dbUpdate;
let firebaseReady = false;

document.addEventListener('firebase-ready', () => {
  db = window._db;
  dbRef = window._dbRef;
  dbSet = window._dbSet;
  dbPush = window._dbPush;
  dbOnValue = window._dbOnValue;
  dbRemove = window._dbRemove;
  dbUpdate = window._dbUpdate;
  firebaseReady = true;

  // Check if config is real
  try {
    const testRef = dbRef(db, '.info/connected');
    dbOnValue(testRef, snap => {
      if (snap.val() === true) {
        document.getElementById('configWarning').style.display = 'none';
      }
    });
  } catch(e) {}

  listenItems();
  listenPresence();
});

// ════════════════════════════════
//  Presence (online users)
// ════════════════════════════════
function updateOnlinePresence() {
  if (!firebaseReady || !currentUser) return;
  const presRef = dbRef(db, `presence/${currentUser.id}`);
  dbSet(presRef, { name: currentUser.name, color: currentUser.color, ts: Date.now() });
  // Clean up on disconnect
  window.addEventListener('beforeunload', () => dbRemove(presRef));
  // Refresh every 20s
  setInterval(() => dbSet(presRef, { name: currentUser.name, color: currentUser.color, ts: Date.now() }), 20000);
}

function listenPresence() {
  if (!firebaseReady) return;
  dbOnValue(dbRef(db, 'presence'), snap => {
    const all = snap.val() || {};
    const now = Date.now();
    // Keep only users active in last 60s
    const active = Object.values(all).filter(u => (now - u.ts) < 60000);
    document.getElementById('onlineCount').textContent = `${active.length} 人在線`;
    const stack = document.getElementById('onlineAvatars');
    stack.innerHTML = active.slice(0, 5).map(u =>
      `<div class="avatar" style="background:${u.color}" title="${u.name}">${initials(u.name)}</div>`
    ).join('');
  });
}

// ════════════════════════════════
//  Items (Realtime sync)
// ════════════════════════════════
let localItems = {}; // id -> {name, url, tier, addedBy, addedByColor}

function listenItems() {
  dbOnValue(dbRef(db, 'items'), snap => {
    localItems = snap.val() || {};
    renderAll();
    // If comment panel is open, refresh the tier badge in header
    if (currentPanelItemId && localItems[currentPanelItemId]) {
      const item = localItems[currentPanelItemId];
      const tier = item.tier || 'unranked';
      const badge = document.getElementById('panelTierBadge');
      if (badge) {
        badge.textContent = tier === 'unranked' ? '待分類' : tier;
        badge.style.background = TIER_COLORS[tier] || '#ddd';
      }
    }
  });
}

function renderAll() {
  // Clear all tier-items
  document.querySelectorAll('.tier-items').forEach(el => el.innerHTML = '');

  Object.entries(localItems).forEach(([id, item]) => {
    const el = buildItemEl(id, item);
    const tierEl = getTierEl(item.tier || 'unranked');
    if (tierEl) tierEl.appendChild(el);
  });
}

function getTierEl(tier) {
  const row = document.querySelector(`.tier-row[data-tier="${tier}"]`);
  return row ? row.querySelector('.tier-items') : document.getElementById('unranked');
}

function buildItemEl(id, item) {
  const div = document.createElement('div');
  div.className = 'food-item';
  div.id = 'fi_' + id;
  div.draggable = true;
  div.dataset.id = id;

  // ── 桌機 drag ──
  div.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', id);
    div.classList.add('dragging');
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  // ── 頂部色條 ──
  const tierColor = TIER_COLORS[item.tier || 'unranked'] || '#dfe6e9';
  const bar = document.createElement('div');
  bar.className = 'food-item-bar';
  bar.style.background = tierColor;

  // ── 店名（點 → Google Maps）──
  const body = document.createElement('div');
  body.className = 'food-item-body';
  const link = document.createElement('a');
  link.className = 'food-name';
  link.href = item.url;
  link.target = '_blank';
  link.rel = 'noopener';
  link.textContent = item.name;
  link.ondragstart = e => e.preventDefault();
  body.appendChild(link);

  // ── 底部列 ──
  const footer = document.createElement('div');
  footer.className = 'food-item-footer';

  const av = document.createElement('div');
  av.className = 'food-avatar';
  av.style.background = item.addedByColor || '#aaa';
  av.textContent = initials(item.addedBy || '?');
  av.title = `${item.addedBy || '?'} 新增`;

  const addedBy = document.createElement('span');
  addedBy.className = 'food-added-by';
  addedBy.textContent = item.addedBy || '?';

  // 💬 badge — 點擊開評論
  const commentCount = item.comments ? Object.keys(item.comments).length : 0;
  const badge = document.createElement('button');
  badge.className = 'comment-badge' + (commentCount > 0 ? ' has-comments' : '');
  badge.id = `badge_${id}`;
  badge.textContent = commentCount > 0 ? (commentCount > 9 ? '9+' : commentCount) + ' 💬' : '💬';
  badge.title = '查看評論';
  badge.onclick = e => { e.stopPropagation(); openCommentPanel(id); };
  // 阻止 badge 上的觸控啟動拖曳
  badge.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
  badge.addEventListener('touchend',   e => e.stopPropagation(), { passive: true });

  // ✕ 刪除
  const del = document.createElement('button');
  del.className = 'food-delete';
  del.innerHTML = '×';
  del.title = '刪除';
  let delTimer = null;
  del.onclick = e => {
    e.stopPropagation();
    if (del.classList.contains('confirm')) {
      clearTimeout(delTimer);
      deleteItem(id);
    } else {
      del.classList.add('confirm');
      div.classList.add('confirm-delete');
      del.textContent = '確認?';
      delTimer = setTimeout(() => {
        del.classList.remove('confirm');
        div.classList.remove('confirm-delete');
        del.innerHTML = '×';
      }, 2500);
    }
  };
  del.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
  del.addEventListener('touchend',   e => e.stopPropagation(), { passive: true });

  footer.append(av, addedBy, badge, del);
  div.append(bar, body, footer);

  // ── 手機觸控拖曳 ──
  setupTouchDrag(div, id);

  // ── 桌機點擊 → 評論 ──
  div.addEventListener('click', e => {
    if (e.target.closest('a') || e.target.closest('button')) return;
    if (window.matchMedia('(hover: none)').matches) return;
    openCommentPanel(id);
  });

  return div;
}

// ════════════════════════════════
//  Add Restaurant
// ════════════════════════════════

function extractNameFromUrl(url) {
  try {
    const m = url.match(/\/place\/([^/?]+)/);
    if (m) return decodeURIComponent(m[1].replace(/\+/g, ' '));
  } catch(e) {}
  return null;
}

function isShortUrl(url) {
  return /maps\.app\.goo\.gl|goo\.gl\/maps/i.test(url);
}

// Called on every keystroke in URL box
function onUrlInput(el) {
  const url = el.value.trim();
  if (isShortUrl(url)) {
    // Short URL detected → show name row immediately
    showNameRow(url);
  } else {
    hideNameRow();
  }
}

function showNameRow(url) {
  document.getElementById('urlRow').style.display = 'none';
  const nameRow = document.getElementById('nameRow');
  nameRow.style.display = 'block';
  document.getElementById('nameRowUrl').textContent = url;
  const input = document.getElementById('inlineNameInput');
  input.value = '';
  disableConfirmBtn(true);
  setTimeout(() => input.focus(), 80);
}

function hideNameRow() {
  document.getElementById('urlRow').style.display = 'flex';
  document.getElementById('nameRow').style.display = 'none';
}

function clearUrlInput() {
  document.getElementById('mapUrl').value = '';
  hideNameRow();
  setTimeout(() => document.getElementById('mapUrl').focus(), 80);
}

function onNameInput(el) {
  disableConfirmBtn(el.value.trim().length === 0);
}

function disableConfirmBtn(disabled) {
  const btn = document.getElementById('confirmNameBtn');
  btn.disabled = disabled;
  btn.style.opacity = disabled ? '0.5' : '1';
}

function confirmInlineName() {
  const name = document.getElementById('inlineNameInput').value.trim();
  if (!name) return;
  const url = document.getElementById('mapUrl').value.trim();
  hideNameRow();
  document.getElementById('mapUrl').value = '';
  doAddRestaurant(url, name);
}

async function addRestaurant() {
  if (!currentUser) {
    pendingUrl = document.getElementById('mapUrl').value.trim();
    changeUser();
    return;
  }
  const url = document.getElementById('mapUrl').value.trim();
  if (!url) { showToast('請貼上 Google Maps 連結'); return; }

  // 長網址 → 直接解析
  const name = extractNameFromUrl(url);
  if (name) {
    doAddRestaurant(url, name);
    return;
  }

  // 短網址 → 展開 inline name row
  if (isShortUrl(url)) {
    showNameRow(url);
    return;
  }

  // 其他無法解析的網址 → 也展開 name row
  showNameRow(url);
}

function confirmManualName() {
  confirmInlineName();
}

function doAddRestaurant(url, name) {
  if (!firebaseReady) {
    // Offline mode - just render locally
    const id = 'local_' + Date.now();
    localItems[id] = { name, url, tier: 'unranked', addedBy: currentUser.name, addedByColor: currentUser.color };
    renderAll();
    showToast(`已新增：${name}`);
    document.getElementById('mapUrl').value = '';
    return;
  }

  const newRef = dbPush(dbRef(db, 'items'));
  dbSet(newRef, {
    name,
    url,
    tier: 'unranked',
    addedBy: currentUser.name,
    addedByColor: currentUser.color,
    createdAt: Date.now()
  }).then(() => {
    showToast(`✅ 已新增：${name}`);
    document.getElementById('mapUrl').value = '';
  });
}

function deleteItem(id) {
  if (firebaseReady) {
    dbRemove(dbRef(db, `items/${id}`));
  } else {
    delete localItems[id];
    renderAll();
  }
}

// ════════════════════════════════
//  Drag & Drop (Mouse + Touch)
// ════════════════════════════════
function allowDrop(e) { e.preventDefault(); }

function dragEnter(e) {
  const zone = e.currentTarget;
  zone.parentElement.classList.add('drag-over');
}
function dragLeave(e) {
  const zone = e.currentTarget;
  if (!zone.contains(e.relatedTarget)) {
    zone.parentElement.classList.remove('drag-over');
  }
}

function drop(e) {
  e.preventDefault();
  const id = e.dataTransfer.getData('text');
  if (!id) return;

  let targetZone = e.target;
  while (targetZone && !targetZone.classList.contains('tier-items')) {
    targetZone = targetZone.parentElement;
  }
  if (!targetZone) return;

  const tierRow = targetZone.closest('.tier-row');
  const newTier = tierRow ? tierRow.dataset.tier : 'unranked';
  tierRow && tierRow.classList.remove('drag-over');
  commitTierChange(id, newTier);
}

function commitTierChange(id, newTier) {
  if (firebaseReady && !id.startsWith('local_')) {
    dbUpdate(dbRef(db, `items/${id}`), { tier: newTier });
  } else {
    if (localItems[id]) localItems[id].tier = newTier;
    renderAll();
  }
}

// ════════════════════════════════
//  Tier Picker (手機點擊選等級)
// ════════════════════════════════
const TIERS = ['SSS','SS','S','A','B','C','D','ㄆㄨㄣ','unranked'];
const TIER_LABEL = { SSS:'SSS', SS:'SS', S:'S', A:'A', B:'B', C:'C', D:'D', 'ㄆㄨㄣ':'ㄆㄨㄣ', unranked:'待分類' };

let tierPickerItemId = null;

function openTierPicker(id) {
  tierPickerItemId = id;
  const item = localItems[id];
  if (!item) return;

  // Build sheet
  let sheet = document.getElementById('tierPickerSheet');
  if (!sheet) {
    const backdrop = document.createElement('div');
    backdrop.id = 'tierPickerBackdrop';
    backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;backdrop-filter:blur(2px);';
    backdrop.onclick = closeTierPicker;

    sheet = document.createElement('div');
    sheet.id = 'tierPickerSheet';
    sheet.style.cssText = `
      position:fixed;left:0;right:0;bottom:0;
      background:var(--surface);
      border-radius:20px 20px 0 0;
      z-index:301;
      padding:0 0 env(safe-area-inset-bottom,16px);
      box-shadow:0 -8px 40px rgba(0,0,0,0.15);
      animation:sheetUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
    `;
    document.body.appendChild(backdrop);
    document.body.appendChild(sheet);
  }

  const currentTier = item.tier || 'unranked';

  sheet.innerHTML = `
    <div style="padding:12px 20px 4px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted)">移動到</div>
        <div style="font-size:1rem;font-weight:800;margin-top:1px">${escHtml(item.name)}</div>
      </div>
      <button onclick="closeTierPicker()" style="background:var(--surface2);border:none;border-radius:50%;width:32px;height:32px;font-size:1.1rem;cursor:pointer;color:var(--text-muted)">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px">
      ${TIERS.map(t => {
        const color = TIER_COLORS[t] || '#dfe6e9';
        const isCurrent = t === currentTier;
        return `
          <button onclick="pickTier('${t}')" style="
            border:2.5px solid ${isCurrent ? color : 'transparent'};
            background:${isCurrent ? color+'22' : 'var(--surface2)'};
            border-radius:12px;padding:10px 4px;cursor:pointer;
            font-family:inherit;font-weight:800;font-size:${t==='ㄆㄨㄣ'?'0.7rem':'1rem'};
            color:${isCurrent ? color : 'var(--text)'};
            display:flex;flex-direction:column;align-items:center;gap:4px;
            transition:all 0.15s;position:relative;
          ">
            <span style="width:10px;height:10px;border-radius:50%;background:${color};display:block"></span>
            ${TIER_LABEL[t]}
            ${isCurrent ? '<span style="position:absolute;top:4px;right:4px;font-size:0.55rem;background:'+color+';color:white;padding:1px 4px;border-radius:99px;font-weight:700">現在</span>' : ''}
          </button>`;
      }).join('')}
    </div>
  `;

  document.getElementById('tierPickerBackdrop').style.display = 'block';
  sheet.style.display = 'block';
}

function closeTierPicker() {
  const backdrop = document.getElementById('tierPickerBackdrop');
  const sheet = document.getElementById('tierPickerSheet');
  if (backdrop) backdrop.style.display = 'none';
  if (sheet) sheet.style.display = 'none';
  tierPickerItemId = null;
}

function pickTier(tier) {
  if (!tierPickerItemId) return;
  commitTierChange(tierPickerItemId, tier);
  closeTierPicker();
  showToast(`已移到 ${TIER_LABEL[tier]}`);
}

// ════════════════════════════════
//  Touch Drag (手機拖曳)
// ════════════════════════════════
let _touchDragEl   = null;
let _touchDragId   = null;
let _touchGhost    = null;
let _touchHoldTimer = null;
let _touchLastRow  = null;
let _touchStartX   = 0;
let _touchStartY   = 0;
let _touchDragging = false;

function setupTouchDrag(el, id) {
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    _touchStartX = t.clientX;
    _touchStartY = t.clientY;
    _touchDragging = false;

    // 長按 350ms 啟動拖曳
    _touchHoldTimer = setTimeout(() => {
      _startTouchDrag(e, el, id);
    }, 350);
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = Math.abs(t.clientX - _touchStartX);
    const dy = Math.abs(t.clientY - _touchStartY);

    if (!_touchDragging) {
      // 還沒啟動拖曳，如果移動超過 8px 就取消長按（讓頁面正常捲動）
      if (dx > 8 || dy > 8) clearTimeout(_touchHoldTimer);
      return;
    }

    e.preventDefault(); // 拖曳中阻止頁面捲動
    _moveTouchDrag(t);
  }, { passive: false });

  el.addEventListener('touchend', e => {
    clearTimeout(_touchHoldTimer);
    if (_touchDragging) _endTouchDrag(e);
  });

  el.addEventListener('touchcancel', () => {
    clearTimeout(_touchHoldTimer);
    _cancelTouchDrag();
  });
}

function _startTouchDrag(e, el, id) {
  _touchDragging = true;
  _touchDragEl = el;
  _touchDragId = id;
  el.classList.add('dragging');
  if (navigator.vibrate) navigator.vibrate(35);

  const rect = el.getBoundingClientRect();
  _touchGhost = el.cloneNode(true);
  _touchGhost.style.cssText = `
    position:fixed;
    left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px;
    pointer-events:none;
    z-index:9999;
    opacity:0.88;
    transform:scale(1.06) rotate(2deg);
    box-shadow:0 12px 32px rgba(0,0,0,0.22);
    border-radius:12px;
    transition:transform 0.1s;
  `;
  document.body.appendChild(_touchGhost);
}

function _moveTouchDrag(touch) {
  if (!_touchGhost) return;
  const rect = _touchDragEl.getBoundingClientRect();
  _touchGhost.style.left = (touch.clientX - rect.width / 2) + 'px';
  _touchGhost.style.top  = (touch.clientY - rect.height / 2) + 'px';

  // 高亮目標 tier row
  _touchGhost.style.display = 'none';
  const below = document.elementFromPoint(touch.clientX, touch.clientY);
  _touchGhost.style.display = '';

  const row = below ? below.closest('.tier-row') : null;
  if (_touchLastRow && _touchLastRow !== row) _touchLastRow.classList.remove('drag-over');
  if (row) { row.classList.add('drag-over'); _touchLastRow = row; }
}

function _endTouchDrag(e) {
  const touch = e.changedTouches[0];
  if (_touchGhost) _touchGhost.style.display = 'none';
  const below = document.elementFromPoint(touch.clientX, touch.clientY);
  if (_touchGhost) _touchGhost.style.display = '';

  const row = below ? below.closest('.tier-row') : null;
  if (row) commitTierChange(_touchDragId, row.dataset.tier || 'unranked');

  _cancelTouchDrag();
}

function _cancelTouchDrag() {
  if (_touchGhost)   { _touchGhost.remove();                       _touchGhost = null; }
  if (_touchDragEl)  { _touchDragEl.classList.remove('dragging');  _touchDragEl = null; }
  if (_touchLastRow) { _touchLastRow.classList.remove('drag-over'); _touchLastRow = null; }
  _touchDragId   = null;
  _touchDragging = false;
}

// 保留舊名相容
function addTouchDrag(el, id) { setupTouchDrag(el, id); }

// ════════════════════════════════
//  Comment Panel
// ════════════════════════════════
let currentPanelItemId = null;
let commentUnsubscribe = null;

const TIER_COLORS = { SSS:'#ff4757', SS:'#ff7f50', S:'#ffa502', A:'#2ed573', B:'#1e90ff', C:'#a29bfe', D:'#b2bec3', 'ㄆㄨㄣ':'#6d4c41', unranked:'#dfe6e9' };

function openCommentPanel(itemId) {
  currentPanelItemId = itemId;
  const item = localItems[itemId];
  if (!item) return;

  // Populate header
  document.getElementById('panelName').textContent = item.name;
  document.getElementById('panelMapLink').href = item.url;
  const tier = item.tier || 'unranked';
  const badge = document.getElementById('panelTierBadge');
  badge.textContent = tier === 'unranked' ? '待分類' : tier;
  badge.style.background = TIER_COLORS[tier] || '#ddd';

  document.getElementById('commentPanel').style.display = 'flex';
  document.getElementById('commentPanelBackdrop').style.display = 'block';
  document.getElementById('commentTextarea').value = '';

  // Listen to comments for this item
  if (commentUnsubscribe) commentUnsubscribe();
  if (firebaseReady) {
    commentUnsubscribe = () => {}; // firebase onValue returns unsubscribe fn
    const unsubFn = dbOnValue(dbRef(db, `items/${itemId}/comments`), snap => {
      renderComments(snap.val() || {});
    });
    commentUnsubscribe = unsubFn;
  } else {
    renderComments((localItems[itemId] && localItems[itemId].comments) || {});
  }

  setTimeout(() => document.getElementById('commentTextarea').focus(), 200);
}

function closeCommentPanel() {
  document.getElementById('commentPanel').style.display = 'none';
  document.getElementById('commentPanelBackdrop').style.display = 'none';
  if (commentUnsubscribe) { commentUnsubscribe(); commentUnsubscribe = null; }
  currentPanelItemId = null;
}

function renderComments(comments) {
  const list = document.getElementById('commentList');
  const entries = Object.entries(comments).sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0));

  if (entries.length === 0) {
    list.innerHTML = '<div class="comment-empty"><span class="empty-icon">💬</span>還沒有評論，來留第一則！</div>';
    return;
  }

  list.innerHTML = entries.map(([cid, c]) => {
    const time = c.ts ? timeAgo(c.ts) : '';
    const isOwn = currentUser && c.authorId === currentUser.id;
    return `
      <div class="comment-item" id="c_${cid}">
        <div class="comment-avatar" style="background:${c.authorColor || '#aaa'}" title="${c.author || '?'}">${initials(c.author || '?')}</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-author">${escHtml(c.author || '?')}</span>
            <span class="comment-time">${time}</span>
          </div>
          <div class="comment-text">${escHtml(c.text)}</div>
          ${isOwn ? `<button class="comment-delete-btn" onclick="deleteComment('${cid}')">刪除</button>` : ''}
        </div>
      </div>`;
  }).join('');

  // Scroll to bottom
  list.scrollTop = list.scrollHeight;
}

function sendComment() {
  if (!currentUser) { changeUser(); return; }
  const textarea = document.getElementById('commentTextarea');
  const text = textarea.value.trim();
  if (!text || !currentPanelItemId) return;

  const comment = {
    text,
    author: currentUser.name,
    authorId: currentUser.id,
    authorColor: currentUser.color,
    ts: Date.now()
  };

  if (firebaseReady && !currentPanelItemId.startsWith('local_')) {
    const cRef = dbPush(dbRef(db, `items/${currentPanelItemId}/comments`));
    dbSet(cRef, comment);
  } else {
    if (!localItems[currentPanelItemId].comments) localItems[currentPanelItemId].comments = {};
    const cid = 'lc_' + Date.now();
    localItems[currentPanelItemId].comments[cid] = comment;
    renderComments(localItems[currentPanelItemId].comments);
  }

  textarea.value = '';
  textarea.style.height = '';
}

function deleteComment(commentId) {
  if (!currentPanelItemId) return;
  if (firebaseReady) {
    dbRemove(dbRef(db, `items/${currentPanelItemId}/comments/${commentId}`));
  } else {
    delete localItems[currentPanelItemId].comments[commentId];
    renderComments(localItems[currentPanelItemId].comments);
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return '剛剛';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分鐘前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小時前`;
  return `${Math.floor(diff/86400000)} 天前`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════
//  Toast
// ════════════════════════════════
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ════════════════════════════════
//  Init
// ════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadUser();
  if (!currentUser) {
    setTimeout(() => document.getElementById('nameInput').focus(), 300);
  }
});
</script>
